<article class="dashboard-card">
  <div class="dashboard-card__icon">
    <img [src]="iconPath" alt="Humidity" />
  </div>

  <div class="dashboard-card__content">
    <div class="dashboard-card__title-row">
      <h2>Humidity</h2>
    </div>

    <div class="dashboard-card__metric-row">
      <span class="dashboard-card__metric-label">Relative humidity</span>
      <span class="dashboard-card__metric-value">{{ humidity | number:'1.2-2' }} %</span>
    </div>
  </div>
</article>
